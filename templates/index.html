<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Crypto Dashboard Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0b0f19;
    color: #fff;
}

.card-crypto {
    background: #111827;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
}

.positive { color: #00ff99; }
.negative { color: #ff4d4d; }

table {
    background: #111827;
}
</style>
</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">🚀 Crypto Dashboard Pro</h2>

<div class="row">
    {% for coin in prices %}
    <div class="col-md-4">
        <div class="card-crypto">
            <h5>{{ coin.symbol }}</h5>
            <h4>${{ coin.price }}</h4>

            <span class="{{ 'positive' if coin.change|float > 0 else 'negative' }}">
                {{ coin.change }}%
            </span>
        </div>
    </div>
    {% endfor %}
</div>

<hr>

<table class="table table-dark table-striped">
<thead>
<tr>
<th>Moeda</th>
<th>Preço</th>
<th>24h %</th>
</tr>
</thead>

<tbody>
{% for coin in prices %}
<tr>
<td>{{ coin.symbol }}</td>
<td>${{ coin.price }}</td>
<td class="{{ 'positive' if coin.change|float > 0 else 'negative' }}">
    {{ coin.change }}%
</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>

</body>
</html>
