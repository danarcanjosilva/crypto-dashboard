<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Crypto Dashboard Live</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0b0f19;
    color: white;
}

.card {
    background: #111827;
    margin-bottom: 10px;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container mt-4">
<h2>🚀 Crypto Dashboard (Live)</h2>

<div id="coins"></div>

</div>

<script>
const symbols = ["btcusdt", "ethusdt", "bnbusdt", "solusdt", "adausdt"];

const prices = {};

// cria conexão WebSocket Binance
symbols.forEach(symbol => {
    const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol}@trade`);

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        prices[symbol.toUpperCase()] = parseFloat(data.p).toFixed(4);

        render();
    };
});

function render() {
    let html = "";

    for (let coin in prices) {
        html += `
            <div class="card">
                <h5>${coin}</h5>
                <h3>$${prices[coin]}</h3>
            </div>
        `;
    }

    document.getElementById("coins").innerHTML = html;
}
</script>

</body>
</html>
