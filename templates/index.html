<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<title>Crypto Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1 class="mb-4">
🚀 Crypto Dashboard
</h1>

<table class="table table-dark table-striped">

<thead>

<tr>
<th>Moeda</th>
<th>Preço USD</th>
<th>24h %</th>
</tr>

</thead>

<tbody>

{% for coin in prices %}

<tr>
<td>{{ coin.symbol }}</td>
<td>${{ coin.price }}</td>
<td>{{ coin.change }}%</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
