<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Crypto Dashboard Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0b0f19;
    color:white;
}

.card{
    background:#1e293b;
    color:white;
    border:none;
    border-radius:15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

h4{
    color:white;
}

p{
    color:#cbd5e1;
}

.price{
    font-size:1.8rem;
    font-weight:bold;
    color:#f8fafc;
}

.positive{
    color:#22c55e;
    font-weight:bold;
}

.negative{
    color:#ef4444;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container mt-4">

<h1 class="mb-4">🚀 Crypto Dashboard Pro</h1>

<div class="row">

{% for coin in prices %}

<div class="col-md-4 mb-3">

<div class="card p-3">

<h4>{{ coin.symbol }}</h4>

<div
id="{{ coin.symbol }}"
class="price">
${{ "%.4f"|format(coin.price) }}
</div>

<p class="{% if coin.change > 0 %}positive{% else %}negative{% endif %}">
24h: {{ "%.2f"|format(coin.change) }}%
</p>

<p>📈 Máxima: {{ "%.4f"|format(coin.high) }}</p>

<p>📉 Mínima: {{ "%.4f"|format(coin.low) }}</p>

<p>📊 Volume: {{ "%.2f"|format(coin.volume) }}</p>

</div>

</div>

{% endfor %}

</div>

</div>

<script>

const symbols = [
"btcusdt",
"ethusdt",
"bnbusdt",
"solusdt",
"adausdt"
];

symbols.forEach(symbol => {

const ws =
new WebSocket(
`wss://stream.binance.com:9443/ws/${symbol}@trade`
);

ws.onmessage = event => {

const data = JSON.parse(event.data);

const id = symbol.toUpperCase();

const el = document.getElementById(id);

if(el){
el.innerText =
"$" + parseFloat(data.p).toFixed(4);
}

};

});

</script>

</body>
</html>
